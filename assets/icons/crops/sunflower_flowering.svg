<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <!-- Stem -->
  <line x1="60" y1="110" x2="60" y2="50" stroke="#558B2F" stroke-width="5" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M60 96 C46 88 26 82 10 76 C4 74 2 66 8 64 C20 62 44 72 60 86Z" fill="#2E7D32"/>
  <path d="M60 96 C74 88 94 82 110 76 C116 74 118 66 112 64 C100 62 76 72 60 86Z" fill="#2E7D32"/>
  <path d="M60 76 C48 68 32 60 18 54 C12 51 10 44 16 42 C26 40 46 50 60 66Z" fill="#33691E"/>
  <path d="M60 76 C72 68 88 60 102 54 C108 51 110 44 104 42 C94 40 74 50 60 66Z" fill="#33691E"/>
  <!-- Involucre bracts (green) -->
  <path d="M44 54 C46 44 54 38 60 36 C66 38 74 44 76 54 C72 50 66 46 60 46 C54 46 48 50 44 54Z" fill="#388E3C"/>
  <!-- Yellow ray petals (strap-shaped) -->
  <g transform="translate(60,46)">
    <!-- 16 ray petals at 22.5 degree intervals -->
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(0)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(22.5)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(45)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(67.5)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(90)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(112.5)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(135)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(157.5)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(180)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(202.5)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(225)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(247.5)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(270)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(292.5)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(315)"/>
    <ellipse cx="0" cy="-18" rx="4" ry="8" fill="#FDD835" transform="rotate(337.5)"/>
    <!-- Disk florets (outer ring open, center closed) -->
    <circle r="13" fill="#5D4037"/>
    <circle r="10" fill="#4E342E"/>
    <!-- Fresh pollen ring (outer disk open) -->
    <circle r="13" fill="none" stroke="#F57F17" stroke-width="2" stroke-dasharray="2,1"/>
    <!-- Highlight -->
    <circle cx="-4" cy="-4" r="4" fill="#6D4C41" opacity="0.4"/>
  </g>
</svg>
