<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <!-- Hypocotyl -->
  <line x1="60" y1="110" x2="60" y2="90" stroke="#558B2F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cotyledons (large, oval — epigeal) -->
  <ellipse cx="47" cy="87" rx="12" ry="7" fill="#8BC34A" transform="rotate(-10,47,87)"/>
  <ellipse cx="73" cy="87" rx="12" ry="7" fill="#8BC34A" transform="rotate(10,73,87)"/>
  <!-- Cotyledon midribs -->
  <line x1="40" y1="89" x2="54" y2="85" stroke="#CDDC39" stroke-width="0.8" opacity="0.7"/>
  <line x1="66" y1="89" x2="80" y2="85" stroke="#CDDC39" stroke-width="0.8" opacity="0.7"/>
  <!-- Epicotyl -->
  <line x1="60" y1="90" x2="60" y2="72" stroke="#388E3C" stroke-width="2" stroke-linecap="round"/>
  <!-- First trifoliate — unifoliate (primary leaves) -->
  <path d="M60 74 C52 68 40 64 34 58 C30 54 32 48 38 50 C46 52 56 62 60 70Z" fill="#388E3C"/>
  <path d="M60 74 C68 68 80 64 86 58 C90 54 88 48 82 50 C74 52 64 62 60 70Z" fill="#388E3C"/>
  <!-- Midribs -->
  <path d="M60 72 C52 66 40 60 34 54" stroke="#66BB6A" stroke-width="0.8" fill="none" opacity="0.6"/>
</svg>
