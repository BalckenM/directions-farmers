<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <!-- Stake -->
  <line x1="60" y1="108" x2="60" y2="18" stroke="#8D6E63" stroke-width="2"/>
  <!-- Vine -->
  <path d="M60 108 C67 98 73 86 68 74 C63 62 55 52 60 40 C65 28 73 20 68 12" stroke="#33691E" stroke-width="2" fill="none"/>
  <!-- Dense trifoliate leaves -->
  <g transform="translate(62,96)"><line x1="0" y1="0" x2="-14" y2="-9" stroke="#388E3C" stroke-width="1.5"/>
    <ellipse cx="-18" cy="-13" rx="9" ry="6" fill="#2E7D32" transform="rotate(-20,-18,-13)"/>
    <ellipse cx="-24" cy="-7" rx="8" ry="5.5" fill="#33691E" transform="rotate(-30,-24,-7)"/>
    <ellipse cx="-13" cy="-18" rx="8" ry="5.5" fill="#33691E" transform="rotate(-10,-13,-18)"/>
  </g>
  <g transform="translate(58,78)"><line x1="0" y1="0" x2="14" y2="-9" stroke="#388E3C" stroke-width="1.5"/>
    <ellipse cx="18" cy="-13" rx="9" ry="6" fill="#2E7D32" transform="rotate(20,18,-13)"/>
    <ellipse cx="24" cy="-7" rx="8" ry="5.5" fill="#33691E" transform="rotate(30,24,-7)"/>
    <ellipse cx="13" cy="-18" rx="8" ry="5.5" fill="#33691E" transform="rotate(10,13,-18)"/>
  </g>
  <g transform="translate(62,60)"><line x1="0" y1="0" x2="-12" y2="-8" stroke="#388E3C" stroke-width="1.3"/>
    <ellipse cx="-16" cy="-11" rx="8" ry="5.5" fill="#388E3C" transform="rotate(-20,-16,-11)"/>
    <ellipse cx="-21" cy="-6" rx="7" ry="5" fill="#2E7D32" transform="rotate(-30,-21,-6)"/>
    <ellipse cx="-12" cy="-16" rx="7" ry="5" fill="#2E7D32" transform="rotate(-10,-12,-16)"/>
  </g>
  <!-- Butterfly-shaped legume flowers (papilionaceous) -->
  <!-- Flower 1 (pink/purple) -->
  <g transform="translate(76,82)">
    <!-- Standard petal -->
    <ellipse cx="0" cy="-8" rx="7" ry="5" fill="#CE93D8"/>
    <!-- Wing petals -->
    <ellipse cx="-6" cy="-4" rx="5" ry="3.5" fill="#BA68C8" transform="rotate(-20,-6,-4)"/>
    <ellipse cx="6" cy="-4" rx="5" ry="3.5" fill="#BA68C8" transform="rotate(20,6,-4)"/>
    <!-- Keel -->
    <ellipse cx="0" cy="-2" rx="4" ry="3" fill="#AB47BC"/>
    <!-- Vein on standard -->
    <path d="M0,-12 Q0,-8 0,-4" stroke="#9C27B0" stroke-width="0.5" fill="none" opacity="0.4"/>
  </g>
  <!-- Flower 2 (white) -->
  <g transform="translate(42,65)">
    <ellipse cx="0" cy="-8" rx="7" ry="5" fill="white"/>
    <ellipse cx="-6" cy="-4" rx="5" ry="3.5" fill="#F5F5F5" transform="rotate(-20,-6,-4)"/>
    <ellipse cx="6" cy="-4" rx="5" ry="3.5" fill="#F5F5F5" transform="rotate(20,6,-4)"/>
    <ellipse cx="0" cy="-2" rx="4" ry="3" fill="#EEEEEE"/>
    <path d="M-3,-10 Q0,-8 3,-10" stroke="#9C27B0" stroke-width="0.5" fill="none" opacity="0.3"/>
  </g>
  <!-- Flower 3 bud -->
  <ellipse cx="72" cy="56" rx="4" ry="6" fill="#CE93D8" transform="rotate(-15,72,56)"/>
</svg>
