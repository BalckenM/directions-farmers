  <path d="M52 122 Q60 120 68 122" stroke="#E64A19" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M52 127 Q60 125 68 127" stroke="#E64A19" stroke-width="0.8" fill="none" opacity="0.4"/>
