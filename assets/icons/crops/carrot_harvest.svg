<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
    <linearGradient id="carrotBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="40%" stop-color="#F57C00"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
  </defs>
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <circle cx="20" cy="122" r="1.5" fill="#8D6E63" opacity="0.5"/>
  <circle cx="88" cy="138" r="1.2" fill="#8D6E63" opacity="0.5"/>
  <!-- Full carrot root (pulled slightly out, angled) -->
  <!-- Root visible above soil -->
  <path d="M48 108 C50 104 55 100 60 98 C65 100 70 104 72 108 C70 110 65 112 60 113 C55 112 50 110 48 108Z" fill="url(#carrotBody)"/>
