  <path d="M60 68 Q56 60 55 54" stroke="#558B2F" stroke-width="1.2" fill="none"/>
  <path d="M60 68 Q64 60 65 54" stroke="#558B2F" stroke-width="1.2" fill="none"/>
  <path d="M92 68 Q97 62 98 56" stroke="#558B2F" stroke-width="1.2" fill="none"/>
  <path d="M82 80 Q87 74 88 68" stroke="#558B2F" stroke-width="1.2" fill="none"/>
