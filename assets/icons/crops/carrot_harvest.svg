  <path d="M60 100 Q50 80 42 58" stroke="#33691E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M60 100 Q60 78 60 52" stroke="#33691E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M60 100 Q70 80 78 58" stroke="#33691E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M60 100 Q78 86 92 68" stroke="#33691E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
