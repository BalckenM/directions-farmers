  <path d="M28 68 Q23 62 22 56" stroke="#558B2F" stroke-width="1.2" fill="none"/>
  <path d="M38 80 Q33 74 32 68" stroke="#558B2F" stroke-width="1.2" fill="none"/>
  <path d="M42 58 Q38 50 37 44" stroke="#558B2F" stroke-width="1.2" fill="none"/>
