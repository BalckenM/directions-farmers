<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
    <radialGradient id="bulbGrad" cx="32%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="60%" stop-color="#D84315"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </radialGradient>
  </defs>
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <!-- Large mature bulb (partially above soil) -->
  <ellipse cx="60" cy="108" rx="24" ry="18" fill="url(#bulbGrad)"/>
  <!-- Bulb skin layers (papery onion skins) -->
  <path d="M36 106 Q44 98 60 96 Q76 98 84 106" stroke="#FF8A65" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M38 110 Q46 102 60 100 Q74 102 82 110" stroke="#FF8A65" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M40 114 Q48 108 60 106 Q72 108 80 114" stroke="#BF360C" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Outer dry skin (papery brown) -->
  <ellipse cx="60" cy="108" rx="24" ry="18" fill="none" stroke="#8D3800" stroke-width="1.5" opacity="0.3"/>
  <!-- Neck (top of bulb — narrow) -->
  <path d="M54 91 Q56 86 60 84 Q64 86 66 91" fill="#2E7D32"/>
  <!-- Dried tops (fallen over — harvest sign) -->
  <path d="M60 84 Q48 78 36 68" stroke="#8D8000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M60 84 Q58 72 52 56" stroke="#8D8000" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M60 84 Q66 72 68 56" stroke="#8D8000" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M60 84 Q72 78 84 68" stroke="#8D8000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Roots hanging below -->
  <path d="M50 124 Q48 130 46 136" stroke="#D4C490" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M55 125 Q54 132 53 138" stroke="#D4C490" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M60 126 Q60 132 60 138" stroke="#D4C490" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M65 125 Q66 132 67 138" stroke="#D4C490" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M70 124 Q72 130 74 136" stroke="#D4C490" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Highlight on bulb -->
  <ellipse cx="50" cy="100" rx="8" ry="5" fill="#FF8A65" opacity="0.25"/>
</svg>
