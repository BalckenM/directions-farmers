<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <!-- Tillers with heads emerging (anthesis) -->
  <!-- Left tiller -->
  <path d="M38 110 Q34 88 30 62" stroke="#558B2F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M32 76 Q26 68 22 60" stroke="#558B2F" stroke-width="1.2" fill="none"/>
  <!-- Ear at top left -->
  <g transform="translate(30,62)">
    <line x1="0" y1="0" x2="0" y2="-24" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="-3" cy="-6" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <ellipse cx="3" cy="-6" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <ellipse cx="-3" cy="-12" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <ellipse cx="3" cy="-12" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <ellipse cx="-3" cy="-18" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <ellipse cx="3" cy="-18" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <!-- Awns -->
    <line x1="-3" y1="-8" x2="-5" y2="-14" stroke="#558B2F" stroke-width="0.8"/>
    <line x1="3" y1="-8" x2="5" y2="-14" stroke="#558B2F" stroke-width="0.8"/>
    <line x1="-3" y1="-20" x2="-5" y2="-28" stroke="#558B2F" stroke-width="0.8"/>
    <line x1="3" y1="-20" x2="5" y2="-28" stroke="#558B2F" stroke-width="0.8"/>
    <!-- Yellow anthers peeking out (anthesis) -->
    <circle cx="-3" cy="-9" r="1" fill="#FDD835"/>
    <circle cx="3" cy="-15" r="1" fill="#FDD835"/>
    <circle cx="-3" cy="-21" r="1" fill="#FDD835"/>
  </g>
  <!-- Center tiller -->
  <path d="M60 110 Q60 88 60 58" stroke="#558B2F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M60 84 Q52 74 46 64" stroke="#558B2F" stroke-width="1.3" fill="none"/>
  <path d="M60 84 Q68 74 74 64" stroke="#558B2F" stroke-width="1.3" fill="none"/>
  <!-- Center ear -->
  <g transform="translate(60,58)">
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="-4" cy="-6" rx="4" ry="2.5" fill="#66BB6A"/>
    <ellipse cx="4" cy="-6" rx="4" ry="2.5" fill="#66BB6A"/>
    <ellipse cx="-4" cy="-13" rx="4" ry="2.5" fill="#66BB6A"/>
    <ellipse cx="4" cy="-13" rx="4" ry="2.5" fill="#66BB6A"/>
    <ellipse cx="-4" cy="-20" rx="4" ry="2.5" fill="#66BB6A"/>
    <ellipse cx="4" cy="-20" rx="4" ry="2.5" fill="#66BB6A"/>
    <line x1="0" y1="-26" x2="0" y2="-34" stroke="#66BB6A" stroke-width="1"/>
    <line x1="-4" y1="-22" x2="-6" y2="-30" stroke="#558B2F" stroke-width="0.8"/>
    <line x1="4" y1="-22" x2="6" y2="-30" stroke="#558B2F" stroke-width="0.8"/>
    <circle cx="4" cy="-8" r="1.2" fill="#FDD835"/>
    <circle cx="-4" cy="-15" r="1.2" fill="#FDD835"/>
    <circle cx="4" cy="-22" r="1.2" fill="#FDD835"/>
  </g>
  <!-- Right tiller -->
  <path d="M82 110 Q86 88 90 62" stroke="#558B2F" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M88 76 Q94 68 98 60" stroke="#558B2F" stroke-width="1.2" fill="none"/>
  <!-- Right ear -->
  <g transform="translate(90,62)">
    <line x1="0" y1="0" x2="0" y2="-24" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="-3" cy="-6" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <ellipse cx="3" cy="-6" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <ellipse cx="-3" cy="-13" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <ellipse cx="3" cy="-13" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <ellipse cx="-3" cy="-20" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <ellipse cx="3" cy="-20" rx="3.5" ry="2.2" fill="#66BB6A"/>
    <circle cx="-3" cy="-8" r="1" fill="#FDD835"/>
    <circle cx="3" cy="-14" r="1" fill="#FDD835"/>
  </g>
</svg>
