  <path d="M60 76 C70 68 86 62 100 56" stroke="#66BB6A" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Leaf pair 3 (upper, smaller) -->
  <path d="M60 56 C52 50 40 44 30 40 C24 38 22 32 28 30 C36 28 52 36 60 48Z" fill="#388E3C"/>
  <path d="M60 56 C68 50 80 44 90 40 C96 38 98 32 92 30 C84 28 68 36 60 48Z" fill="#388E3C"/>
