  <path d="M60 100 C48 94 28 90 14 84 C6 80 4 72 12 70 C24 68 46 78 60 92Z" fill="#33691E"/>
  <path d="M60 100 C72 94 92 90 106 84 C114 80 116 72 108 70 C96 68 74 78 60 92Z" fill="#33691E"/>
