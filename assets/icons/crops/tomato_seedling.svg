  <line x1="67" y1="84" x2="77" y2="80" stroke="#A5D6A7" stroke-width="0.8" opacity="0.7"/>
  <!-- First true leaves (serrated tomato leaf shape) -->
  <path d="M60 78 C55 72 44 68 42 62 C40 58 46 54 50 58 C54 62 58 70 60 74 C62 70 66 62 70 58 C74 54 80 58 78 62 C76 68 65 72 60 78Z" fill="#2E7D32"/>
  <line x1="60" y1="76" x2="60" y2="63" stroke="#66BB6A" stroke-width="0.8" opacity="0.7"/>
</svg>
