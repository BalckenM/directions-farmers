<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <circle cx="20" cy="122" r="1.2" fill="#8D6E63" opacity="0.5"/>
  <circle cx="85" cy="135" r="1.5" fill="#8D6E63" opacity="0.5"/>
  <!-- Stem -->
  <line x1="60" y1="110" x2="60" y2="78" stroke="#388E3C" stroke-width="2" stroke-linecap="round"/>
  <!-- Cotyledons (oblong, rounded) -->
