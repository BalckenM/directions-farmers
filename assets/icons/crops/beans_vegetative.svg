<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <!-- Stake -->
  <line x1="60" y1="108" x2="60" y2="20" stroke="#8D6E63" stroke-width="2" stroke-linecap="round"/>
  <!-- Climbing vine twisting up stake -->
  <path d="M60 108 C66 100 72 90 68 80 C64 70 56 62 60 52 C64 42 72 34 68 24" stroke="#33691E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Trifoliate leaves — characteristic bean compound leaves -->
  <!-- Leaf set 1 (bottom) -->
  <g transform="translate(60,95)">
    <!-- Petiole -->
    <line x1="0" y1="0" x2="-16" y2="-10" stroke="#388E3C" stroke-width="1.5"/>
    <!-- Three leaflets -->
    <ellipse cx="-20" cy="-14" rx="9" ry="6" fill="#388E3C" transform="rotate(-20,-20,-14)"/>
    <ellipse cx="-27" cy="-8" rx="8" ry="5.5" fill="#2E7D32" transform="rotate(-30,-27,-8)"/>
    <ellipse cx="-14" cy="-20" rx="8" ry="5.5" fill="#2E7D32" transform="rotate(-10,-14,-20)"/>
    <!-- Midribs -->
    <line x1="-15" y1="-10" x2="-25" y2="-18" stroke="#66BB6A" stroke-width="0.7" opacity="0.6"/>
  </g>
  <!-- Leaf set 2 (right) -->
  <g transform="translate(60,78)">
    <line x1="0" y1="0" x2="14" y2="-8" stroke="#388E3C" stroke-width="1.5"/>
    <ellipse cx="18" cy="-13" rx="9" ry="6" fill="#388E3C" transform="rotate(20,18,-13)"/>
    <ellipse cx="24" cy="-7" rx="8" ry="5.5" fill="#2E7D32" transform="rotate(30,24,-7)"/>
    <ellipse cx="13" cy="-19" rx="8" ry="5.5" fill="#2E7D32" transform="rotate(10,13,-19)"/>
  </g>
  <!-- Leaf set 3 (left) -->
  <g transform="translate(60,62)">
    <line x1="0" y1="0" x2="-14" y2="-8" stroke="#388E3C" stroke-width="1.5"/>
    <ellipse cx="-18" cy="-13" rx="9" ry="6" fill="#388E3C" transform="rotate(-20,-18,-13)"/>
    <ellipse cx="-24" cy="-7" rx="8" ry="5.5" fill="#2E7D32" transform="rotate(-30,-24,-7)"/>
    <ellipse cx="-13" cy="-19" rx="8" ry="5.5" fill="#2E7D32" transform="rotate(-10,-13,-19)"/>
  </g>
  <!-- Leaf set 4 (upper right) -->
  <g transform="translate(60,46)">
    <line x1="0" y1="0" x2="12" y2="-6" stroke="#388E3C" stroke-width="1.3"/>
    <ellipse cx="16" cy="-10" rx="8" ry="5" fill="#43A047" transform="rotate(20,16,-10)"/>
    <ellipse cx="22" cy="-5" rx="7" ry="4.5" fill="#388E3C" transform="rotate(30,22,-5)"/>
    <ellipse cx="11" cy="-15" rx="7" ry="4.5" fill="#388E3C" transform="rotate(10,11,-15)"/>
  </g>
  <!-- Tendril at top -->
  <path d="M60 26 C64 22 68 20 66 16 C64 12 60 14 60 18" stroke="#558B2F" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
