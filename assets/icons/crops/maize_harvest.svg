<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
    <linearGradient id="huskGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8BC34A"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
  </defs>
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <!-- Stalk (golden, dry) -->
  <line x1="60" y1="110" x2="60" y2="16" stroke="#8D6E00" stroke-width="5" stroke-linecap="round"/>
  <!-- Node bands -->
  <ellipse cx="60" cy="90" rx="4" ry="2.5" fill="#6D5200"/>
  <ellipse cx="60" cy="68" rx="4" ry="2.5" fill="#6D5200"/>
  <!-- Dry golden leaves drooping -->
  <path d="M60 94 C50 86 28 82 10 80 C4 80 2 74 8 73 C18 71 42 78 58 88Z" fill="#9E8000" opacity="0.85"/>
  <path d="M60 88 C72 80 94 76 112 74 C118 73 118 67 112 67 C102 65 78 72 62 82Z" fill="#9E8000" opacity="0.85"/>
  <path d="M60 72 C50 64 32 58 18 56 C12 55 10 49 16 48 C26 46 48 54 58 66Z" fill="#A58800" opacity="0.8"/>
  <path d="M60 66 C70 58 88 52 104 50 C110 49 112 43 106 42 C96 40 74 48 62 60Z" fill="#A58800" opacity="0.8"/>
  <!-- Mature ear of corn -->
  <!-- Outer husk leaves -->
  <path d="M58 88 C52 82 48 74 50 66 C52 58 58 54 60 54 C62 54 68 58 70 66 C72 74 68 82 62 88Z" fill="url(#huskGrad)"/>
  <!-- Husk veins -->
  <path d="M55 84 Q54 74 56 62" stroke="#81C784" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M65 84 Q66 74 64 62" stroke="#81C784" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Corn cob peeking out at top -->
  <rect x="56" y="44" width="8" height="16" rx="4" fill="#FDD835"/>
  <!-- Kernels rows -->
  <circle cx="58" cy="48" r="1.5" fill="#F9A825"/>
  <circle cx="62" cy="48" r="1.5" fill="#F9A825"/>
  <circle cx="58" cy="53" r="1.5" fill="#F9A825"/>
  <circle cx="62" cy="53" r="1.5" fill="#F9A825"/>
  <circle cx="58" cy="58" r="1.5" fill="#F9A825"/>
  <circle cx="62" cy="58" r="1.5" fill="#F9A825"/>
  <!-- Dried silk -->
  <path d="M64 45 Q70 38 72 30" stroke="#8D6E63" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M64 47 Q71 41 74 34" stroke="#8D6E63" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M63 49 Q69 44 71 38" stroke="#8D6E63" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Dry tassel -->
  <line x1="60" y1="16" x2="60" y2="8" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="12" x2="52" y2="6" stroke="#8D6E63" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="60" y1="12" x2="68" y2="6" stroke="#8D6E63" stroke-width="1.2" stroke-linecap="round"/>
</svg>
