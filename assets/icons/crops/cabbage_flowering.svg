<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <!-- Soil -->
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <circle cx="15" cy="125" r="1.5" fill="#8D6E63" opacity="0.5"/>
  <circle cx="85" cy="135" r="1.2" fill="#8D6E63" opacity="0.5"/>
  <!-- Outer leaves — large, mature blue-green -->
  <path d="M60 110 C44 96 24 86 14 74 C10 68 18 60 26 66 C38 74 52 90 60 104 C68 90 82 74 94 66 C102 60 110 68 106 74 C96 86 76 96 60 110Z" fill="#43A047"/>
  <path d="M60 108 C46 94 28 82 18 70" stroke="#66BB6A" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M60 108 C74 94 92 82 102 70" stroke="#66BB6A" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Inner leaves -->
  <path d="M60 104 C48 92 38 80 38 70 C38 62 48 56 60 60 C72 56 82 62 82 70 C82 80 72 92 60 104Z" fill="#2E7D32"/>
  <!-- Tight head -->
  <circle cx="60" cy="72" r="18" fill="#1B5E20"/>
  <circle cx="54" cy="66" r="8" fill="#2E7D32" opacity="0.5"/>
  <!-- Bolting stem with yellow flower buds -->
  <line x1="60" y1="60" x2="60" y2="40" stroke="#558B2F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="50" x2="72" y2="44" stroke="#558B2F" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="46" x2="48" y2="40" stroke="#558B2F" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Yellow flowers (Brassica) -->
  <circle cx="60" cy="38" r="5" fill="#FDD835"/>
  <circle cx="73" cy="42" r="4" fill="#FDD835"/>
  <circle cx="47" cy="37" r="4" fill="#FDD835"/>
  <!-- Petal detail -->
  <path d="M57 35 Q60 31 63 35" stroke="#F9A825" stroke-width="1" fill="none"/>
  <path d="M57 41 Q60 45 63 41" stroke="#F9A825" stroke-width="1" fill="none"/>
</svg>
