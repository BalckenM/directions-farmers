<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <circle cx="20" cy="120" r="1.5" fill="#8D6E63" opacity="0.6"/>
  <circle cx="95" cy="130" r="1.2" fill="#8D6E63" opacity="0.5"/>
  <!-- Stake -->
  <line x1="60" y1="108" x2="60" y2="18" stroke="#8D6E63" stroke-width="2" stroke-linecap="round"/>
  <!-- Vine -->
  <path d="M60 108 C67 98 73 86 68 74 C63 62 55 52 60 40 C65 28 73 22 69 16" stroke="#558B2F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Mature leaves (slightly yellowing edges) -->
  <g transform="translate(60,92)">
    <line x1="0" y1="0" x2="-18" y2="-12" stroke="#388E3C" stroke-width="1.5"/>
    <ellipse cx="-22" cy="-16" rx="10" ry="6.5" fill="#33691E" transform="rotate(-20,-22,-16)"/>
    <ellipse cx="-29" cy="-10" rx="9" ry="6" fill="#2E7D32" transform="rotate(-30,-29,-10)"/>
    <ellipse cx="-16" cy="-22" rx="9" ry="6" fill="#2E7D32" transform="rotate(-10,-16,-22)"/>
  </g>
  <g transform="translate(60,72)">
    <line x1="0" y1="0" x2="16" y2="-10" stroke="#388E3C" stroke-width="1.5"/>
    <ellipse cx="20" cy="-15" rx="10" ry="6.5" fill="#33691E" transform="rotate(20,20,-15)"/>
    <ellipse cx="26" cy="-9" rx="9" ry="6" fill="#2E7D32" transform="rotate(30,26,-9)"/>
    <ellipse cx="15" cy="-21" rx="9" ry="6" fill="#2E7D32" transform="rotate(10,15,-21)"/>
  </g>
  <!-- Bean pods — characteristic flattened oval shapes -->
  <g transform="translate(60,84)">
    <line x1="0" y1="0" x2="10" y2="-5" stroke="#558B2F" stroke-width="1"/>
    <path d="M10 -5 Q18 -12 22 -6 Q24 0 16 2 Q8 4 10 -5Z" fill="#8BC34A" stroke="#558B2F" stroke-width="0.8"/>
    <!-- Bean bumps in pod -->
    <circle cx="13" cy="-4" r="2" fill="#558B2F" opacity="0.4"/>
    <circle cx="17" cy="-6" r="2" fill="#558B2F" opacity="0.4"/>
    <circle cx="20" cy="-4" r="2" fill="#558B2F" opacity="0.4"/>
  </g>
  <g transform="translate(60,65)">
    <line x1="0" y1="0" x2="-10" y2="-5" stroke="#558B2F" stroke-width="1"/>
    <path d="M-10 -5 Q-18 -12 -22 -6 Q-24 0 -16 2 Q-8 4 -10 -5Z" fill="#9CCC65" stroke="#558B2F" stroke-width="0.8"/>
    <circle cx="-13" cy="-4" r="2" fill="#558B2F" opacity="0.4"/>
    <circle cx="-17" cy="-6" r="2" fill="#558B2F" opacity="0.4"/>
    <circle cx="-20" cy="-4" r="2" fill="#558B2F" opacity="0.4"/>
  </g>
  <g transform="translate(60,50)">
    <line x1="0" y1="0" x2="12" y2="-4" stroke="#558B2F" stroke-width="1"/>
    <path d="M12 -4 Q20 -10 23 -4 Q24 2 17 3 Q10 4 12 -4Z" fill="#8BC34A" stroke="#558B2F" stroke-width="0.8"/>
    <circle cx="15" cy="-3" r="1.8" fill="#558B2F" opacity="0.4"/>
    <circle cx="19" cy="-5" r="1.8" fill="#558B2F" opacity="0.4"/>
    <circle cx="22" cy="-3" r="1.8" fill="#558B2F" opacity="0.4"/>
  </g>
</svg>
