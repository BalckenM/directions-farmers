  <line x1="60" y1="14" x2="50" y2="6" stroke="#BFAD00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="14" x2="70" y2="6" stroke="#BFAD00" stroke-width="1.5" stroke-linecap="round"/>
