<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <!-- Soil -->
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <circle cx="18" cy="124" r="1.5" fill="#8D6E63" opacity="0.6"/>
  <circle cx="60" cy="138" r="1" fill="#8D6E63" opacity="0.6"/>
  <circle cx="95" cy="128" r="1.5" fill="#8D6E63" opacity="0.5"/>
  <!-- Thin stem -->
  <line x1="60" y1="110" x2="60" y2="85" stroke="#388E3C" stroke-width="2" stroke-linecap="round"/>
  <!-- Cotyledons -->
  <ellipse cx="50" cy="87" rx="8" ry="5" fill="#66BB6A" transform="rotate(-25,50,87)"/>
  <ellipse cx="70" cy="87" rx="8" ry="5" fill="#66BB6A" transform="rotate(25,70,87)"/>
  <!-- Midrib veins cotyledons -->
  <line x1="46" y1="89" x2="54" y2="85" stroke="#A5D6A7" stroke-width="0.8" opacity="0.7"/>
  <line x1="66" y1="89" x2="74" y2="85" stroke="#A5D6A7" stroke-width="0.8" opacity="0.7"/>
  <!-- First true leaf emerging -->
  <ellipse cx="60" cy="80" rx="6" ry="4" fill="#4CAF50"/>
  <line x1="60" y1="83" x2="60" y2="77" stroke="#81C784" stroke-width="0.7" opacity="0.8"/>
</svg>
