<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <!-- Soil -->
  <rect x="0" y="110" width="120" height="50" fill="url(#soil)"/>
  <circle cx="20" cy="122" r="1.5" fill="#8D6E63" opacity="0.6"/>
  <circle cx="55" cy="135" r="1" fill="#8D6E63" opacity="0.6"/>
  <circle cx="90" cy="128" r="1.8" fill="#8D6E63" opacity="0.5"/>
  <circle cx="35" cy="145" r="1.2" fill="#8D6E63" opacity="0.6"/>
  <circle cx="75" cy="150" r="1" fill="#8D6E63" opacity="0.5"/>
  <!-- Seed in soil -->
  <ellipse cx="60" cy="117" rx="6" ry="4" fill="#8D6E63"/>
  <ellipse cx="60" cy="116" rx="5" ry="3" fill="#A1887F"/>
  <!-- Radicle emerging -->
  <path d="M60 113 Q61 108 60 104" stroke="#81C784" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Tiny cotyledon bud -->
  <ellipse cx="59" cy="104" rx="3" ry="2" fill="#A5D6A7" transform="rotate(-20,59,104)"/>
  <ellipse cx="62" cy="103" rx="3" ry="2" fill="#A5D6A7" transform="rotate(20,62,103)"/>
