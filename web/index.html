<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Smart farming management for South African farmers.">
  <meta name="theme-color" content="#2E7D32">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="4Directions Farm">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-startup-image" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>4Directions Farmer</title>
  <link rel="manifest" href="manifest.json">

  <!-- Performance: preload critical resources and warm up CDN connections -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    let _pwaPrompt;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _pwaPrompt = e;
      window.dispatchEvent(new CustomEvent('pwaInstallReady'));
    });
    window.triggerPwaInstall = async function() {
      if (!_pwaPrompt) return 'not-available';
      _pwaPrompt.prompt();
      var result = await _pwaPrompt.userChoice;
      _pwaPrompt = null;
      return result.outcome;
    };
  </script>
</body>
</html>
