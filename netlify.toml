# Netlify configuration for 4Directions Farmer web
# Place this file in the project root (alongside pubspec.yaml)

[build]
  publish = "build/web"
  command = "flutter build web --release --tree-shake-icons -O4"

[[headers]]
  # Never cache index.html
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  # Never cache service worker
  for = "/flutter_service_worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  # Long cache for all other assets (Flutter hashes filenames)
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  # Flutter web router — all paths serve index.html
  from = "/*"
  to = "/index.html"
  status = 200
